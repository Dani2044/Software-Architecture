server:
  port: 8087

spring:
  application:
    name: shc

  datasource:
    url: jdbc:mysql://${DB_HOST:mysql-shc}:3306/sps_shc_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://10.43.100.111:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASS:admin}
    packages:
      trust-all: true
  jms:
    pub-sub-domain: false

sps:
  cola:
    shc: cola.shc

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    "[com.sps.shc]": INFO
