version: '3.8'

services:

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: sps_auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql

  mysql-compra:
    image: mysql:8.0
    container_name: mysql-compra
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: sps_compra_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-compra-data:/var/lib/mysql

  mysql-sam:
    image: mysql:8.0
    container_name: mysql-sam
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: sps_sam_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-sam-data:/var/lib/mysql

  mysql-shc:
    image: mysql:8.0
    container_name: mysql-shc
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: sps_shc_db
    ports:
      - "3310:3306"
    volumes:
      - mysql-shc-data:/var/lib/mysql

  sqlserver-saludpay:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-saludpay
    environment:
      SA_PASSWORD: ${SQLSERVER_PASS}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  activemq:
    image: apache/activemq-classic:latest
    container_name: activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ACTIVEMQ_ADMIN_LOGIN: ${ACTIVEMQ_USER}
      ACTIVEMQ_ADMIN_PASSWORD: ${ACTIVEMQ_PASS}

volumes:
  mysql-auth-data:
  mysql-compra-data:
  mysql-sam-data:
  mysql-shc-data:
  sqlserver-data: