server:
  port: 8081

spring:
  application:
    name: ms-compra

  datasource:
    url: jdbc:mysql://${DB_HOST:mysql-compra}:3306/sps_compra_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://10.43.100.111:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASS:admin}
    packages:
      trust-all: true
  jms:
    pub-sub-domain: false

sps:
  cola:
    pago: cola.pago
    sam: cola.sam
    shc: cola.shc

sns:
  base-url: ${SNS_URL:http://10.43.100.122:8090}
  codigo-aseguradora: ${SNS_CODIGO:ASEG001}
  timeout-ms: 5000
  polling-ms: 15000

email:
  base-url: ${EMAIL_URL:http://10.43.100.122:8084}
  sps-url-pago: ${SPS_URL_PAGO:http://10.43.101.18:4201/pago}

saludpay:
  base-url: ${SALUD_PAY_URL:http://10.43.101.18:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[com.sps.compra]": INFO
