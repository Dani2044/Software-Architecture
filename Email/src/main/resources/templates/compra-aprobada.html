<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compra Aprobada — SPS</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: auto;">
    <h2 style="color: #2E7D32;">Su compra fue aprobada</h2>
    <p>Hola <strong th:text="${nombreCliente}">Cliente</strong>,</p>
    <p>Su solicitud de compra en SPS ha sido aprobada por la Superintendencia Nacional de Salud.</p>
    <p>Para continuar, por favor realice el pago:</p>
    <ul>
        <li><strong>Número de compra:</strong> <span th:text="${numeroCompra}"></span></li>
        <li><strong>Valor a pagar:</strong> $<span th:text="${#numbers.formatDecimal(valorCompra, 1, 'COMMA', 2, 'POINT')}"></span></li>
    </ul>
    <p>
        <a th:href="${urlPago}" style="background-color:#2E7D32;color:white;padding:10px 20px;text-decoration:none;border-radius:4px;">
            Ir a SaludPay
        </a>
    </p>
    <p style="color:#888;font-size:12px;">Este es un correo automático, por favor no responda.</p>
</body>
</html>
