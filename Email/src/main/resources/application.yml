server:
  port: 8084

spring:
  application:
    name: sps-email
  profiles:
    active: production
  datasource:
    url: jdbc:mysql://10.43.101.18:3306/sps_email?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: sps_user
    password: sps_pass_CAMBIAR
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

email:
  from: ${MAIL_USER}
  salud-pay-url: ${SALUD_PAY_URL:http://10.43.101.18:8080}
  sps-url-pago: ${SPS_URL_PAGO:http://10.43.101.18:4200/pago}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[co.sps.email]": INFO
    "[org.springframework.mail]": WARN
