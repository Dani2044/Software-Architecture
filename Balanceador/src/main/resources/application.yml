server:
  port: 8085

spring:
  application:
    name: sps-balanceador
  profiles:
    active: production
  webflux:
    base-path: /
  datasource:
    url: jdbc:mysql://10.43.101.18:3306/sps_balanceador?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: sps_user
    password: sps_pass_CAMBIAR
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

balanceador:
  backends:
    - http://10.43.100.111:8082
    - http://10.43.99.121:8082
    - http://10.43.99.121:8083
  healthcheck:
    interval-ms: 15000

sns:
  base-url: http://10.43.100.122:8090
  timeout-ms: 5000
  max-retries: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[co.sps.balanceador]": INFO
    "[org.springframework.web.reactive]": WARN
